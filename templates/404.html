{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · Folio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a090c; --surface: #100f13; --accent: #51007A;
    --accent-lite: #8b2fc9; --border: rgba(255,255,255,0.06);
    --text: #e8e4ee; --muted: #7a7185; --muted2: #9d96a8;
    --font-head: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
  }
  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .code {
    font-family: var(--font-head);
    font-size: 7rem;
    font-weight: 300;
    line-height: 1;
    color: var(--accent-lite);
    opacity: 0.4;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.6rem;
  }
  p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
  }
  .btn {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    border: none;
    padding: 10px 24px;
    border-radius: 7px;
    text-decoration: none;
    transition: background 0.18s;
  }
  .btn:hover { background: #6800a0; }
</style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Back to Forums</a>
  </div>
</body>
</html>
